<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Pinned fontconfig for thinlet-modernized Dev Containers.

  Purpose: make font *rendering* (hinting, antialiasing) deterministic across
  hosts so the pinned glyph source is the same everywhere. This does NOT, and
  cannot, freeze the JDK's pixel-metric math (FontMetrics.getAscent /
  stringWidth / getHeight), which still differs across JDK versions — that
  benign drift is absorbed by the trace tolerance model (DECISIONS.md D7).

  Default the toolkit's logical families to the pinned DejaVu set.
-->
<fontconfig>
  <match target="pattern">
    <test name="family"><string>SansSerif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>DejaVu Sans</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>DejaVu Serif</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Monospaced</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>DejaVu Sans Mono</string>
    </edit>
  </match>

  <!-- Deterministic rendering settings. -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>none</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>
</fontconfig>
