version: 2
updates:
  # Maven plugins (no runtime deps in thinlet-core; this watches the build
  # plugin versions in the POMs). Watches main only.
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    groups:
      maven-build-plugins:
        patterns:
          - "*"
    # The test libraries run on the *oldest* test JDK (8/11), so they are pinned
    # below the majors that drop Java 8/11 support: JUnit 6 requires Java 17+ and
    # AssertJ 4 requires Java 17+. Hold them on JUnit 5.x / AssertJ 3.x until the
    # cross-JDK test floor rises (DECISIONS.md D31). Minor/patch bumps still flow.
    ignore:
      - dependency-name: "org.junit:junit-bom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.junit.jupiter:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.assertj:*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    groups:
      github-actions:
        patterns:
          - "*"
