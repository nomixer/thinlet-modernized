name: CI

# Three jobs: `build` runs the full verify (Spotless/Checkstyle/SpotBugs + tests)
# with Maven on JDK 21 (the modern plugins need JDK 11+) — this is also the JDK 21
# *test runtime* row. `test` is the cross-JDK test matrix (runtimes 8/11/17):
# Maven still on 21, compiling the one portable `--release 8` jar, but surefire
# forks the test suite (incl. the golden traces) onto each target JDK via
# toolchains. Together `build` + `test` cover runtimes 8/11/17/21. `api-compat`
# is the japicmp binary-compatibility gate. `trace-diff` is an informational
# (non-gating) job that aggregates the per-JDK trace dumps each runtime row
# uploads into a cross-JDK divergence report. See DECISIONS.md D14/D25/D29/D31/D33.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # push/pull the lean CI dev-container image cache to GHCR (D23)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (Maven JDK 21 / target Java 8)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Maven itself runs on JDK 21 (the modern lint/format plugins require
        # JDK 11+); the published artifact is Java 8 bytecode via --release 8.
        # This job is also the JDK 21 test-runtime row (surefire runs the golden
        # traces on the base JVM). The cross-JDK test matrix (runtimes 8/11/17
        # via toolchains) is the separate `test` job below (DECISIONS.md D31).
        include:
          - { maven_jdk: 21 }
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Cache the Maven local repo *and* the wrapper distribution. Both live
      # under .m2 inside the bind-mounted workspace (via MAVEN_USER_HOME below),
      # which the dev-container user can write to — unlike the root-owned
      # thinlet-m2 named volume at ~/.m2. (See DECISIONS.md D14 / cache note.)
      - name: Cache Maven repository and wrapper
        uses: actions/cache@v5
        with:
          path: .m2
          key: m2-${{ matrix.maven_jdk }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            m2-${{ matrix.maven_jdk }}-

      # MAVEN_USER_HOME points the Maven wrapper's distribution dir
      # (${MAVEN_USER_HOME}/wrapper, see mvnw) and the local repo at the writable
      # workspace .m2, so neither touches the root-owned ~/.m2 named volume.
      # Log in to GHCR so the lean CI image layers can be cached across runs
      # (cacheFrom pulls them; the main-branch run pushes the updated cache).
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & verify inside the Dev Container
        uses: devcontainers/ci@v0.3
        with:
          # Lean CI image (no desktop-lite/noVNC) — the viewable desktop is
          # local-dev only. See DECISIONS.md D22.
          configFile: .devcontainer/ci/devcontainer.json
          # Cache the lean image layers in GHCR: pull as cache every run, push the
          # updated image only on main (push:filter) so PRs reuse but don't
          # publish. Most runs then rebuild only changed layers. See DECISIONS.md D23.
          imageName: ghcr.io/nomixer/thinlet-modernized/devcontainer-ci
          cacheFrom: ghcr.io/nomixer/thinlet-modernized/devcontainer-ci
          push: filter
          runCmd: MAVEN_USER_HOME="$PWD/.m2" ./mvnw -B -Dmaven.repo.local=.m2/repository -Dtrace.dump.dir=target/trace-dump/jdk-21 verify

      # Publish the JDK 21 render trace for the cross-JDK diff (DECISIONS.md D33).
      # The dump is gated by -Dtrace.dump.dir above, so it only runs here.
      - name: Upload JDK 21 trace dump
        uses: actions/upload-artifact@v4
        with:
          name: trace-dump-jdk-21
          path: thinlet-core/target/trace-dump/jdk-21
          if-no-files-found: error

  test:
    name: tests (JDK ${{ matrix.jdk }} via toolchains)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cross-JDK test-runtime rows (DECISIONS.md D31). Every row compiles the
        # same one portable `--release 8` jar on the JVM-21 javac, then surefire
        # forks the golden traces onto the JDK named by `jdk`. The JDK 21 runtime
        # is covered by the `build` job above (Maven's own base JVM), so it is not
        # repeated here. (JDK 25 is deferred — see D31.)
        include:
          - { jdk: 8 }
          - { jdk: 11 }
          - { jdk: 17 }
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Maven repository and wrapper
        uses: actions/cache@v5
        with:
          path: .m2
          key: m2-jdk${{ matrix.jdk }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            m2-jdk${{ matrix.jdk }}-

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Maven runs on the image's base JDK (21) for the lint/format plugins and
      # compiles the one portable jar at --release 8 on its javac;
      # maven-toolchains-plugin (-Pcrossjdk -Djdk.target=N) makes surefire fork
      # the golden-trace suite on the JDK installed at /opt/jdkN (see Dockerfile).
      # The file.encoding=UTF-8 pin in thinlet-core's surefire config keeps
      # decoding consistent across JDKs. See DECISIONS.md D14/D25/D31. Pulls the
      # cached image but does not push it (the build job does).
      - name: Run tests on JDK ${{ matrix.jdk }} (toolchains) inside the Dev Container
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/ci/devcontainer.json
          imageName: ghcr.io/nomixer/thinlet-modernized/devcontainer-ci
          cacheFrom: ghcr.io/nomixer/thinlet-modernized/devcontainer-ci
          push: never
          runCmd: >-
            MAVEN_USER_HOME="$PWD/.m2" ./mvnw -B -Dmaven.repo.local=.m2/repository
            -Pcrossjdk -Djdk.target=${{ matrix.jdk }}
            -Dtrace.dump.dir=target/trace-dump/jdk-${{ matrix.jdk }}
            -t .mvn/toolchains.xml test

      # Publish this runtime's render trace for the cross-JDK diff (DECISIONS.md D33).
      - name: Upload JDK ${{ matrix.jdk }} trace dump
        uses: actions/upload-artifact@v4
        with:
          name: trace-dump-jdk-${{ matrix.jdk }}
          path: thinlet-core/target/trace-dump/jdk-${{ matrix.jdk }}
          if-no-files-found: error

  api-compat:
    name: API compatibility (japicmp vs v0.1.0)
    runs-on: ubuntu-latest
    # japicmp is a pure JDK-21 bytecode comparison: no Xvfb / fonts / JDK-8, so
    # it runs on a plain runner (not the dev container). It resolves the v0.1.0
    # baseline from GitHub Packages, which needs read auth even for public reads
    # (D4); the default `verify` stays token-free because the plugin and that
    # repository are gated behind -Papicheck (see thinlet-core/pom.xml). D29.
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # setup-java writes ~/.m2/settings.xml with a server whose id matches the
      # apicheck profile's repository (github-nomixer), reading credentials from
      # the env vars below; the Maven wrapper reads that settings.xml by default.
      - name: Set up JDK 21 + GitHub Packages read auth
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          server-id: github-nomixer
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      # -DskipTests skips the Xvfb-dependent surefire suite (already covered by
      # the build/test jobs); `package` (implied by verify) still builds the
      # jar japicmp diffs, and -pl thinlet-core -am avoids demos/drafts.
      - name: Check public API against published v0.1.0 (japicmp)
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -B -ntp -Papicheck -DskipTests -pl thinlet-core -am verify

  trace-diff:
    name: Cross-JDK trace diff (informational)
    runs-on: ubuntu-latest
    needs: [build, test]
    # Pure JSON aggregation of the per-JDK trace dumps into a divergence report
    # (DECISIONS.md D33). It renders nothing, so it needs no dev container / Xvfb /
    # toolchain — a plain JDK-21 runner. Informational only: it never gates (a red
    # job here is a tooling bug, not a divergence). Runs after the runtime rows so
    # every trace-dump-jdk-* artifact exists.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Download per-JDK trace dumps
        uses: actions/download-artifact@v4
        with:
          pattern: trace-dump-jdk-*
          path: trace-dumps

      # CrossJdkTraceDiff is gated by -Dtrace.diff.inputDir; absolute paths so it
      # finds the dumps and writes the report regardless of surefire's module CWD.
      - name: Aggregate cross-JDK trace diff
        run: >-
          ./mvnw -B -ntp -pl thinlet-core -Dtest=CrossJdkTraceDiff -DfailIfNoTests=false
          -Dtrace.diff.inputDir="$PWD/trace-dumps"
          -Dtrace.diff.out="$PWD/thinlet-core/target/trace-diff" test

      - name: Upload cross-JDK trace diff report
        uses: actions/upload-artifact@v4
        with:
          name: trace-diff-report
          path: thinlet-core/target/trace-diff
          if-no-files-found: error
