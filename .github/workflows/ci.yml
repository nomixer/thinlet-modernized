name: CI

# Two jobs: `build` runs the full verify (Spotless/Checkstyle/SpotBugs + tests)
# with Maven on JDK 21 (the modern plugins need JDK 11+); `test-jdk8` is the
# first cross-JDK execution row — Maven still on 21, but surefire forks the test
# suite (incl. the golden traces) on JDK 8 via toolchains. Rows 11/17/25 of the
# cross-JDK matrix follow in Phase 2. See DECISIONS.md D14/D25.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # push/pull the lean CI dev-container image cache to GHCR (D23)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (Maven JDK 21 / target Java 8)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Maven itself runs on JDK 21 (the modern lint/format plugins require
        # JDK 11+); Java 8 *bytecode* is enforced by --release 8 in every build.
        # The per-JDK execution matrix (surefire via toolchains) arrives with
        # the Phase 1 test suite and expands in Phase 2:
        #   - { jdk: 8 }
        #   - { jdk: 11 }
        #   - { jdk: 17 }
        #   - { jdk: 21 }
        #   - { jdk: 25 }
        include:
          - { maven_jdk: 21 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache the Maven local repo *and* the wrapper distribution. Both live
      # under .m2 inside the bind-mounted workspace (via MAVEN_USER_HOME below),
      # which the dev-container user can write to — unlike the root-owned
      # thinlet-m2 named volume at ~/.m2. (See DECISIONS.md D14 / cache note.)
      - name: Cache Maven repository and wrapper
        uses: actions/cache@v4
        with:
          path: .m2
          key: m2-${{ matrix.maven_jdk }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            m2-${{ matrix.maven_jdk }}-

      # MAVEN_USER_HOME points the Maven wrapper's distribution dir
      # (${MAVEN_USER_HOME}/wrapper, see mvnw) and the local repo at the writable
      # workspace .m2, so neither touches the root-owned ~/.m2 named volume.
      # Log in to GHCR so the lean CI image layers can be cached across runs
      # (cacheFrom pulls them; the main-branch run pushes the updated cache).
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & verify inside the Dev Container
        uses: devcontainers/ci@v0.3
        with:
          # Lean CI image (no desktop-lite/noVNC) — the viewable desktop is
          # local-dev only. See DECISIONS.md D22.
          configFile: .devcontainer/ci/devcontainer.json
          # Cache the lean image layers in GHCR: pull as cache every run, push the
          # updated image only on main (push:filter) so PRs reuse but don't
          # publish. Most runs then rebuild only changed layers. See DECISIONS.md D23.
          imageName: ghcr.io/nomixer/thinlet-modernized/devcontainer-ci
          cacheFrom: ghcr.io/nomixer/thinlet-modernized/devcontainer-ci
          push: filter
          runCmd: MAVEN_USER_HOME="$PWD/.m2" ./mvnw -B -Dmaven.repo.local=.m2/repository verify

  test-jdk8:
    name: tests (JDK 8 via toolchains)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Maven repository and wrapper
        uses: actions/cache@v4
        with:
          path: .m2
          key: m2-jdk8-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            m2-jdk8-

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Maven runs on the image's base JDK (21) for the lint/format plugins;
      # maven-toolchains-plugin (-Pjdk8-tests) makes surefire fork the test suite
      # on the JDK 8 installed at /opt/jdk8 (see Dockerfile). This is the first
      # true cross-JDK run of the golden traces — the file.encoding=UTF-8 pin in
      # thinlet-core's surefire config keeps decoding consistent. See DECISIONS.md
      # D14/D25. Pulls the cached image but does not push it (the build job does).
      - name: Run tests on JDK 8 (toolchains) inside the Dev Container
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/ci/devcontainer.json
          imageName: ghcr.io/nomixer/thinlet-modernized/devcontainer-ci
          cacheFrom: ghcr.io/nomixer/thinlet-modernized/devcontainer-ci
          push: never
          runCmd: MAVEN_USER_HOME="$PWD/.m2" ./mvnw -B -Dmaven.repo.local=.m2/repository -Pjdk8-tests -t .mvn/jdk8-toolchains.xml test
