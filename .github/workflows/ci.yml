name: CI

# Phase 0: a single build job. The cross-JDK matrix (8 / 11 / 17 / 21 / 25) and
# the cross-JDK trace diff are added one row at a time in Phase 2; the Phase 1
# test suite + golden trace land before that. See thinlet plan, Phase 0 step 8.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (Maven JDK 21 / target Java 8)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Maven itself runs on JDK 21 (the modern lint/format plugins require
        # JDK 11+); Java 8 *bytecode* is enforced by --release 8 in every build.
        # The per-JDK execution matrix (surefire via toolchains) arrives with
        # the Phase 1 test suite and expands in Phase 2:
        #   - { jdk: 8 }
        #   - { jdk: 11 }
        #   - { jdk: 17 }
        #   - { jdk: 21 }
        #   - { jdk: 25 }
        include:
          - { maven_jdk: 21 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache the Maven local repo *and* the wrapper distribution. Both live
      # under .m2 inside the bind-mounted workspace (via MAVEN_USER_HOME below),
      # which the dev-container user can write to — unlike the root-owned
      # thinlet-m2 named volume at ~/.m2. (See DECISIONS.md D14 / cache note.)
      - name: Cache Maven repository and wrapper
        uses: actions/cache@v4
        with:
          path: .m2
          key: m2-${{ matrix.maven_jdk }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            m2-${{ matrix.maven_jdk }}-

      # MAVEN_USER_HOME points the Maven wrapper's distribution dir
      # (${MAVEN_USER_HOME}/wrapper, see mvnw) and the local repo at the writable
      # workspace .m2, so neither touches the root-owned ~/.m2 named volume.
      - name: Build & verify inside the Dev Container
        uses: devcontainers/ci@v0.3
        with:
          # Lean CI image (no desktop-lite/noVNC) — the viewable desktop is
          # local-dev only. See DECISIONS.md D22.
          configFile: .devcontainer/devcontainer.ci.json
          push: never
          runCmd: MAVEN_USER_HOME="$PWD/.m2" ./mvnw -B -Dmaven.repo.local=.m2/repository verify
